<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MyPlate Food Sorting Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f5f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
  h1 { font-size: 22px; font-weight: 600; color: #2c2c2a; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888780; margin-bottom: 1.2rem; }
  .game-wrap { width: 100%; max-width: 680px; }
  .score-bar { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .score-card { background: #fff; border-radius: 10px; border: 0.5px solid #d3d1c7; padding: 8px 16px; font-size: 13px; color: #888780; flex: 1; min-width: 80px; }
  .score-card span { font-size: 20px; font-weight: 600; color: #2c2c2a; display: block; }
  .progress-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .prog-chip { font-size: 12px; padding: 4px 11px; border-radius: 20px; font-weight: 500; }
  .prog-empty { background: #f1efe8; color: #b4b2a9; border: 0.5px dashed #d3d1c7; }
  .prog-filled { background: #eaf3de; color: #3b6d11; }
  .prog-wrong { background: #fcebeb; color: #a32d2d; }
  .game-area { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 500px) { .game-area { grid-template-columns: 1fr; } }
  .plate-zone { display: flex; flex-direction: column; gap: 8px; }
  .plate-svg-wrap { position: relative; width: 100%; }
  .food-panel { display: flex; flex-direction: column; gap: 8px; }
  .food-panel-title { font-size: 13px; color: #888780; margin-bottom: 2px; font-weight: 500; }
  .food-item { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 9px 13px; cursor: grab; display: flex; align-items: center; gap: 10px; font-size: 14px; color: #2c2c2a; user-select: none; transition: transform 0.1s, box-shadow 0.1s; }
  .food-item:hover { transform: scale(1.03); border-color: #b4b2a9; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
  .food-item:active { cursor: grabbing; }
  .food-item.dragging { opacity: 0.4; }
  .food-item.placed { opacity: 0.35; pointer-events: none; text-decoration: line-through; color: #b4b2a9; }
  .feedback-bar { margin-top: 1rem; min-height: 52px; background: #fff; border-radius: 10px; border: 0.5px solid #d3d1c7; padding: 10px 14px; font-size: 14px; color: #2c2c2a; display: flex; align-items: center; gap: 10px; }
  .feedback-icon { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; font-weight: 700; }
  .fb-ok { background: #eaf3de; color: #3b6d11; }
  .fb-bad { background: #fcebeb; color: #a32d2d; }
  .btn { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 9px 18px; font-size: 13px; cursor: pointer; margin-top: 8px; display: inline-block; color: #2c2c2a; transition: background 0.15s; }
  .btn:hover { background: #f1efe8; }
  .btn-primary { background: #3b6d11; color: #fff; border-color: #3b6d11; }
  .btn-primary:hover { background: #27500a; }
  .hint-box { display: none; font-size: 12px; color: #5f5e5a; margin-top: 4px; padding: 10px 12px; background: #e6f1fb; border-radius: 10px; line-height: 1.5; }
  .drag-ghost { position: fixed; pointer-events: none; font-size: 30px; z-index: 9999; transform: translate(-50%, -50%); display: none; }
  .game-complete { text-align: center; padding: 2rem 1.5rem; background: #fff; border-radius: 14px; border: 0.5px solid #d3d1c7; }
  .game-complete h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; color: #2c2c2a; }
  .stars { font-size: 36px; letter-spacing: 4px; margin: 10px 0; }
  .summary-box { font-size: 13px; color: #5f5e5a; background: #f7f5f0; border-radius: 10px; padding: 14px 16px; border: 0.5px solid #d3d1c7; margin: 14px 0; text-align: left; line-height: 1.8; }
  .dairy-row { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: 10px; padding: 10px 14px; border: 0.5px solid #d3d1c7; }
  #dairy-zone { width: 56px; height: 56px; border-radius: 50%; background: #ede5f8; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1.5px dashed #7f77dd; flex-shrink: 0; transition: background 0.2s, border-color 0.2s; }
  #dairy-zone.drag-over { background: #d5c5f0; border-color: #534ab7; }
</style>
</head>
<body>

<div class="game-wrap">
  <h1>🍽️ MyPlate Food Sorting Game</h1>
  <p class="subtitle">Drag each food to the right section of the plate!</p>

  <div class="score-bar">
    <div class="score-card">Points<span id="score">0</span></div>
    <div class="score-card">Correct<span id="correct">0</span></div>
    <div class="score-card">Round<span id="round">1 / 3</span></div>
  </div>

  <div class="progress-row" id="progress-row"></div>

  <div class="game-area" id="game-area">
    <div class="plate-zone">
      <div class="plate-svg-wrap">
        <svg id="plate-svg" viewBox="0 0 300 300" width="100%" xmlns="http://www.w3.org/2000/svg">
          <circle cx="150" cy="150" r="140" fill="#f5f3ef" stroke="#d0cdc5" stroke-width="1.5"/>
          <circle cx="150" cy="150" r="105" fill="none" stroke="#d0cdc5" stroke-width="0.8" stroke-dasharray="4 3"/>
          <path id="zone-veggie" d="M150,150 L150,10 A140,140 0 0,0 10,150 Z" fill="#C0DD97" fill-opacity="0.38" stroke="#639922" stroke-width="0.8"/>
          <path id="zone-fruit"  d="M150,150 L10,150 A140,140 0 0,0 150,290 Z" fill="#FAC775" fill-opacity="0.38" stroke="#BA7517" stroke-width="0.8"/>
          <path id="zone-grain"  d="M150,150 L150,290 A140,140 0 0,0 290,150 Z" fill="#F0997B" fill-opacity="0.32" stroke="#993C1D" stroke-width="0.8"/>
          <path id="zone-protein" d="M150,150 L290,150 A140,140 0 0,0 150,10 Z" fill="#85B7EB" fill-opacity="0.38" stroke="#185FA5" stroke-width="0.8"/>
          <text x="82"  y="92"  text-anchor="middle" font-size="12" font-weight="600" fill="#3b6d11" font-family="-apple-system,sans-serif">Veggies</text>
          <text x="82"  y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#854f0b" font-family="-apple-system,sans-serif">Fruits</text>
          <text x="218" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#993c1d" font-family="-apple-system,sans-serif">Grains</text>
          <text x="218" y="92"  text-anchor="middle" font-size="12" font-weight="600" fill="#185fa5" font-family="-apple-system,sans-serif">Protein</text>
          <line x1="150" y1="10" x2="150" y2="290" stroke="#d0cdc5" stroke-width="0.8"/>
          <line x1="10" y1="150" x2="290" y2="150" stroke="#d0cdc5" stroke-width="0.8"/>
          <g id="placed-layer"></g>
          <path id="drop-veggie"  d="M150,150 L150,10 A140,140 0 0,0 10,150 Z"  fill="transparent" data-zone="veggie"/>
          <path id="drop-fruit"   d="M150,150 L10,150 A140,140 0 0,0 150,290 Z" fill="transparent" data-zone="fruit"/>
          <path id="drop-grain"   d="M150,150 L150,290 A140,140 0 0,0 290,150 Z" fill="transparent" data-zone="grain"/>
          <path id="drop-protein" d="M150,150 L290,150 A140,140 0 0,0 150,10 Z"  fill="transparent" data-zone="protein"/>
        </svg>
      </div>

      <div class="dairy-row">
        <div id="dairy-zone">🥛</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:#534ab7;">Dairy</div>
          <div style="font-size:12px;color:#888780;">Drop your dairy item here</div>
        </div>
      </div>
    </div>

    <div class="food-panel">
      <div class="food-panel-title">Drag each food to the right section!</div>
      <div id="food-list"></div>
      <button class="btn" id="hint-btn">💡 Show a hint</button>
      <div class="hint-box" id="hint-box"></div>
    </div>
  </div>

  <div class="feedback-bar" id="feedback" style="display:none;"></div>
  <button class="btn btn-primary" id="next-btn" style="display:none;">Next round →</button>
  <div class="game-complete" id="complete-screen" style="display:none;"></div>
</div>

<div class="drag-ghost" id="drag-ghost"></div>

<script>
const ROUNDS = [
  { foods: [
    { name:"Broccoli",           emoji:"🥦", zone:"veggie",  hint:"Veggies fill half your plate! They have fiber and lots of vitamins." },
    { name:"Apple slices",       emoji:"🍎", zone:"fruit",   hint:"Fruits also fill half your plate along with veggies — natural sweetness!" },
    { name:"Brown rice",         emoji:"🍚", zone:"grain",   hint:"Grains give us energy. Whole grains like brown rice are the best choice!" },
    { name:"Grilled chicken",    emoji:"🍗", zone:"protein", hint:"Protein helps our muscles grow and heal after exercise." },
    { name:"Low-fat milk",       emoji:"🥛", zone:"dairy",   hint:"Dairy or dairy alternatives help build strong bones and teeth!" },
  ]},
  { foods: [
    { name:"Carrots",            emoji:"🥕", zone:"veggie",  hint:"Colorful veggies like carrots are packed with vitamins!" },
    { name:"Strawberries",       emoji:"🍓", zone:"fruit",   hint:"Berries are a great fruit choice — sweet and full of vitamins." },
    { name:"Whole wheat bread",  emoji:"🍞", zone:"grain",   hint:"Whole wheat bread has more fiber than white bread — fiber is your friend!" },
    { name:"Black beans",        emoji:"🫘", zone:"protein", hint:"Beans have both protein AND fiber — they're super foods!" },
    { name:"Yogurt",             emoji:"🍶", zone:"dairy",   hint:"Yogurt has calcium and good bacteria that help your tummy." },
  ]},
  { foods: [
    { name:"Spinach",            emoji:"🥬", zone:"veggie",  hint:"Dark leafy greens like spinach have lots of iron and calcium." },
    { name:"Blueberries",        emoji:"🫐", zone:"fruit",   hint:"Blueberries are low in sugar and high in antioxidants — brain food!" },
    { name:"Oatmeal",            emoji:"🥣", zone:"grain",   hint:"Oats are a whole grain that keep you feeling full for longer." },
    { name:"Eggs",               emoji:"🥚", zone:"protein", hint:"Eggs have protein and healthy fats — a great breakfast choice!" },
    { name:"String cheese",      emoji:"🧀", zone:"dairy",   hint:"Cheese is a dairy snack that gives you calcium. A little goes a long way!" },
  ]}
];

let roundIdx = 0, score = 0, correctCount = 0, totalCorrect = 0;
let placed = {}, draggingId = null;

function zoneCenter(z) {
  return { veggie:[80,98], fruit:[80,205], grain:[218,205], protein:[218,98] }[z] || [150,150];
}

function renderRound() {
  placed = {};
  document.getElementById('round').textContent = `${roundIdx+1} / ${ROUNDS.length}`;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('hint-box').style.display = 'none';
  document.getElementById('hint-box').textContent = '';
  document.getElementById('placed-layer').innerHTML = '';
  const dz = document.getElementById('dairy-zone');
  dz.textContent = '🥛';
  dz.style.border = '1.5px dashed #7f77dd';
  dz.style.background = '#ede5f8';
  renderFoods();
  renderProgress();
}

function renderFoods() {
  const list = document.getElementById('food-list');
  list.innerHTML = '';
  ROUNDS[roundIdx].foods.forEach((food, i) => {
    const el = document.createElement('div');
    el.className = 'food-item';
    el.id = 'food-' + i;
    el.draggable = true;
    el.innerHTML = `<span style="font-size:24px">${food.emoji}</span><span>${food.name}</span>`;
    el.addEventListener('dragstart', e => {
      draggingId = i;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      document.getElementById('drag-ghost').textContent = food.emoji;
      document.getElementById('drag-ghost').style.display = 'block';
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.getElementById('drag-ghost').style.display = 'none';
    });
    list.appendChild(el);
  });
}

function renderProgress() {
  const row = document.getElementById('progress-row');
  row.innerHTML = '';
  ROUNDS[roundIdx].foods.forEach((food, i) => {
    const chip = document.createElement('div');
    chip.className = 'prog-chip prog-empty';
    chip.id = 'prog-' + i;
    chip.textContent = food.name;
    row.appendChild(chip);
  });
}

function handleDrop(zone) {
  if (draggingId === null || placed[draggingId]) return;
  const food = ROUNDS[roundIdx].foods[draggingId];
  placed[draggingId] = true;

  const isCorrect = food.zone === zone;
  const foodEl = document.getElementById('food-' + draggingId);
  if (foodEl) foodEl.classList.add('placed');

  const chip = document.getElementById('prog-' + draggingId);
  if (chip) chip.className = 'prog-chip ' + (isCorrect ? 'prog-filled' : 'prog-wrong');

  if (zone !== 'dairy') {
    const [cx, cy] = zoneCenter(zone);
    const offsets = [[-18,-18],[18,-14],[0,18],[-16,20],[22,8],[0,-8]];
    const off = offsets[Object.keys(placed).length % offsets.length];
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', cx + off[0]);
    txt.setAttribute('y', cy + off[1]);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dominant-baseline','central');
    txt.setAttribute('font-size','22');
    txt.textContent = food.emoji;
    document.getElementById('placed-layer').appendChild(txt);
  } else {
    const dz = document.getElementById('dairy-zone');
    dz.textContent = food.emoji;
    dz.style.border = `2px solid ${isCorrect ? '#534ab7' : '#a32d2d'}`;
    dz.style.background = isCorrect ? '#d5c5f0' : '#fcebeb';
  }

  if (isCorrect) {
    score += 10; correctCount++; totalCorrect++;
    document.getElementById('score').textContent = score;
    document.getElementById('correct').textContent = correctCount;
  }

  const fb = document.getElementById('feedback');
  fb.style.display = 'flex';
  const correctLabel = food.zone.charAt(0).toUpperCase() + food.zone.slice(1);
  fb.innerHTML = isCorrect
    ? `<div class="feedback-icon fb-ok">✓</div><div><strong>${food.name}</strong> — ${food.hint}</div>`
    : `<div class="feedback-icon fb-bad">✗</div><div>Oops! <strong>${food.name}</strong> goes in <strong>${correctLabel}</strong>. ${food.hint}</div>`;

  draggingId = null;

  if (Object.keys(placed).length === ROUNDS[roundIdx].foods.length) {
    setTimeout(() => {
      if (roundIdx < ROUNDS.length - 1) {
        document.getElementById('next-btn').style.display = 'inline-block';
      } else {
        showComplete();
      }
    }, 900);
  }
}

function showComplete() {
  document.getElementById('game-area').style.display = 'none';
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('progress-row').style.display = 'none';
  document.getElementById('hint-btn').style.display = 'none';
  const max = ROUNDS.reduce((s,r) => s + r.foods.length * 10, 0);
  const pct = score / max;
  const stars = pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.6 ? '⭐⭐' : '⭐';
  const msg = pct >= 0.9 ? "Amazing! You're a MyPlate superstar!" : pct >= 0.6 ? "Great job! You really know your food groups!" : "Good effort! Keep practicing — you're getting it!";
  const screen = document.getElementById('complete-screen');
  screen.style.display = 'block';
  screen.innerHTML = `
    <div class="stars">${stars}</div>
    <h2>${msg}</h2>
    <p style="font-size:14px;color:#888780;margin:6px 0 0;">You scored <strong style="color:#2c2c2a">${score}</strong> out of ${max} points and got <strong style="color:#2c2c2a">${totalCorrect}</strong> foods right!</p>
    <div class="summary-box">
      <strong>Remember the MyPlate rule:</strong><br>
      🥦🍎 Half your plate = Veggies &amp; Fruits<br>
      🍞 Quarter of your plate = Grains (choose whole grains!)<br>
      🍗 Quarter of your plate = Protein<br>
      🥛 Plus a serving of Dairy on the side
    </div>
    <button class="btn btn-primary" onclick="restartGame()">Play again ↺</button>
  `;
}

function restartGame() {
  roundIdx = 0; score = 0; correctCount = 0; totalCorrect = 0;
  document.getElementById('score').textContent = 0;
  document.getElementById('correct').textContent = 0;
  document.getElementById('game-area').style.display = 'grid';
  document.getElementById('progress-row').style.display = 'flex';
  document.getElementById('hint-btn').style.display = 'inline-block';
  document.getElementById('complete-screen').style.display = 'none';
  renderRound();
}

['veggie','fruit','grain','protein'].forEach(zone => {
  const bg = document.getElementById('zone-' + zone);
  const dp = document.getElementById('drop-' + zone);
  const origOpacity = { veggie:'0.38', fruit:'0.38', grain:'0.32', protein:'0.38' };
  [bg, dp].forEach(el => {
    el.addEventListener('dragover', e => { e.preventDefault(); bg.style.fillOpacity = '0.65'; });
    el.addEventListener('dragleave', () => { bg.style.fillOpacity = origOpacity[zone]; });
    el.addEventListener('drop', e => { e.preventDefault(); bg.style.fillOpacity = origOpacity[zone]; handleDrop(zone); });
  });
});

const dairyZone = document.getElementById('dairy-zone');
dairyZone.addEventListener('dragover', e => { e.preventDefault(); dairyZone.classList.add('drag-over'); });
dairyZone.addEventListener('dragleave', () => dairyZone.classList.remove('drag-over'));
dairyZone.addEventListener('drop', e => { e.preventDefault(); dairyZone.classList.remove('drag-over'); handleDrop('dairy'); });

document.addEventListener('dragover', e => {
  const g = document.getElementById('drag-ghost');
  g.style.left = e.clientX + 'px';
  g.style.top  = e.clientY + 'px';
});

document.getElementById('hint-btn').addEventListener('click', () => {
  const hb = document.getElementById('hint-box');
  if (hb.style.display === 'none' || !hb.style.display) {
    const unplaced = ROUNDS[roundIdx].foods.filter((_,i) => !placed[i]);
    if (unplaced.length) {
      hb.textContent = `💡 Hint for "${unplaced[0].name}": ${unplaced[0].hint}`;
      hb.style.display = 'block';
    }
  } else {
    hb.style.display = 'none';
  }
});

document.getElementById('next-btn').addEventListener('click', () => {
  roundIdx++;
  correctCount = 0;
  document.getElementById('correct').textContent = 0;
  renderRound();
});

renderRound();
</script>
</body>
</html>
